name: Backup diário do banco de dados

on:
  schedule:
    - cron: '0 2 * * *'  # 23h (horário de Brasília, UTC-3)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # --ignore-scripts: nenhuma dependência (nem a própria @prisma/client)
      # executa código arbitrário na instalação. O DATABASE_URL só existe
      # no ambiente do passo "Gerar backup", nunca durante a instalação.
      - name: Instalar dependências (sem executar scripts de terceiros)
        working-directory: main
        run: npm ci --ignore-scripts

      - name: Gerar cliente Prisma
        working-directory: main
        run: npx prisma generate

      - name: Gerar backup
        working-directory: main
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/backup-db.js

      - name: Checkout branch de backups
        uses: actions/checkout@v4
        with:
          ref: backups
          path: backups-branch
          fetch-depth: 1

      # Reescreve o branch "backups" do zero a cada execução, mantendo só
      # os N arquivos mais recentes. Isso garante retenção de verdade: os
      # backups antigos são removidos também do histórico do Git, não só
      # da pasta — reduzindo por quanto tempo dados sensíveis ficam expostos.
      - name: Publicar backup no branch "backups" (com retenção real)
        env:
          MAX_BACKUPS: 90
        run: |
          set -euo pipefail
          WS="$GITHUB_WORKSPACE"

          BACKUP_FILE=$(ls -t "$WS"/main/backups/backup-*.json | head -n1)
          cp "$BACKUP_FILE" "$WS/backups-branch/"

          cd "$WS/backups-branch"
          ls -t backup-*.json | tail -n +$((MAX_BACKUPS + 1)) | xargs -r rm --

          git checkout --orphan backups-tmp
          git add README.md
          git add backup-*.json
          git -c user.name="precify-backup-bot" -c user.email="actions@users.noreply.github.com" \
            commit -m "Backups automáticos (últimos $(ls backup-*.json | wc -l)) - $(date -u +%Y-%m-%d)"

          git branch -D backups
          git branch -m backups
          git push --force origin backups
